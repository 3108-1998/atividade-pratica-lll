<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Carpe Diem</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>


<section class="container">
    
    <div class="card">
        <h3>Viva</h3>
        <p>Aproveite o presente.</p>
    </div>

    <div class="card">
        <h3>Sorria</h3>
        <p>A vida fica mais leve.</p>
    </div>

    <div class="card">
        <h3>Sonhe</h3>
        <p>Tudo começa com um sonho.</p>
    </div>

    <div class="card">
        <h3>Aja</h3>
        <p>O momento é agora.</p>
    </div>

    <div class="card">
        <h3>Confie</h3>
        <p>Acredite no seu caminho.</p>
    </div>

    <div class="card">
        <h3>Gratidão</h3>
        <p>Valorize cada conquista.</p>
    </div>

</section>

</body>
</html>
